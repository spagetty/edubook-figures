<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 880" font-family="'Hiragino Kaku Gothic ProN','Hiragino Sans','Yu Gothic',sans-serif">
  <rect width="1000" height="880" fill="#ffffff"/>
  <text x="40" y="46" font-size="22" font-weight="bold" fill="#333d47">図15｜自由度フレームの上で往還する、教科学習とインフォーマルな遊び（第4章・次点）</text>
  <text x="960" y="46" font-size="14" fill="#9aa5ad" text-anchor="end">【仮案】</text>
  <text x="40" y="78" font-size="14" fill="#5c6770">図7（授業の自由度フレーム）の平面に、学校の外の学びを重ねた変形版</text>

  <!-- 平面 -->
  <g opacity="0.5">
    <rect x="150" y="140" width="330" height="280" fill="#eef4f0"/>
    <rect x="480" y="140" width="330" height="280" fill="#e6f1f3"/>
    <rect x="150" y="420" width="330" height="280" fill="#f6f8f9"/>
    <rect x="480" y="420" width="330" height="280" fill="#fdf3e7"/>
    <line x1="480" y1="140" x2="480" y2="700" stroke="#ffffff" stroke-width="4"/>
    <line x1="150" y1="420" x2="810" y2="420" stroke="#ffffff" stroke-width="4"/>
  </g>

  <!-- 軸 -->
  <path d="M 150 710 L 840 710" stroke="#333d47" stroke-width="2.5" marker-end="url(#arrK2)"/>
  <path d="M 150 710 L 150 120" stroke="#333d47" stroke-width="2.5" marker-end="url(#arrK2)"/>
  <text x="495" y="748" font-size="15" fill="#333d47" text-anchor="middle" font-weight="bold">方法の自由度</text>
  <text x="110" y="420" font-size="15" fill="#333d47" text-anchor="middle" font-weight="bold" transform="rotate(-90 110 420)">内容の自由度</text>

  <!-- 学校での教科学習（左下〜左上） -->
  <g>
    <ellipse cx="315" cy="480" rx="145" ry="150" fill="#2e7d8a" opacity="0.14"/>
    <rect x="215" y="430" width="200" height="66" rx="10" fill="#ffffff" stroke="#2e7d8a" stroke-width="2"/>
    <text x="315" y="458" font-size="15.5" fill="#2e7d8a" text-anchor="middle" font-weight="bold">学校での教科学習</text>
    <text x="315" y="482" font-size="12" fill="#5c6770" text-anchor="middle">一斉授業〜共通テーマの探究</text>
  </g>

  <!-- インフォーマルな遊び（右上） -->
  <g>
    <ellipse cx="655" cy="255" rx="140" ry="110" fill="#d9822b" opacity="0.14"/>
    <rect x="555" y="215" width="200" height="66" rx="10" fill="#ffffff" stroke="#d9822b" stroke-width="2"/>
    <text x="655" y="243" font-size="15.5" fill="#d9822b" text-anchor="middle" font-weight="bold">インフォーマルな遊び</text>
    <text x="655" y="267" font-size="12" fill="#5c6770" text-anchor="middle">公園でダンゴムシを探す 等</text>
    <text x="655" y="310" font-size="11.5" fill="#8b979f" text-anchor="middle">方法も内容も、本人の関心から始まる</text>
  </g>

  <!-- 往還の矢印 -->
  <path d="M 420 415 C 480 360 520 330 565 300" fill="none" stroke="#333d47" stroke-width="3.5" marker-end="url(#arrK2)"/>
  <path d="M 545 330 C 500 365 465 395 415 445" fill="none" stroke="#333d47" stroke-width="3.5" marker-end="url(#arrK2)"/>
  <text x="530" y="395" font-size="14" fill="#333d47" font-weight="bold" transform="rotate(-38 530 395)">往還</text>

  <!-- 具体例 -->
  <text x="500" y="790" font-size="13.5" fill="#5c6770" text-anchor="middle">休日のダンゴムシ観察が月曜日の理科（昆虫の体のつくり）と関連づき、</text>
  <text x="500" y="814" font-size="13.5" fill="#5c6770" text-anchor="middle">授業で知った知識を使って次の休みにまた生き物を探しに行く。「学びの地図」の上で両者がつながる</text>

  <defs>
    <marker id="arrK2" markerWidth="10" markerHeight="10" refX="8" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#333d47"/>
    </marker>
  </defs>
</svg>
