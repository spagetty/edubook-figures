<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 900" font-family="'Hiragino Kaku Gothic ProN','Hiragino Sans','Yu Gothic',sans-serif">
  <rect width="1000" height="900" fill="#ffffff"/>
  <text x="40" y="46" font-size="22" font-weight="bold" fill="#333d47">図8｜ステップ0〜＋1の全体旅程図（第3章）</text>
  <text x="960" y="46" font-size="14" fill="#9aa5ad" text-anchor="end">【仮案】</text>
  <text x="40" y="78" font-size="14" fill="#5c6770">自由度フレーム（図7）の平面上を、左下から右上へ進むロードマップ</text>

  <!-- 薄い4象限平面 -->
  <g opacity="0.55">
    <rect x="150" y="150" width="330" height="270" fill="#eef4f0"/>
    <rect x="480" y="150" width="330" height="270" fill="#e6f1f3"/>
    <rect x="150" y="420" width="330" height="270" fill="#f6f8f9"/>
    <rect x="480" y="420" width="330" height="270" fill="#fdf3e7"/>
    <line x1="480" y1="150" x2="480" y2="690" stroke="#ffffff" stroke-width="4"/>
    <line x1="150" y1="420" x2="810" y2="420" stroke="#ffffff" stroke-width="4"/>
  </g>
  <text x="300" y="672" font-size="12.5" fill="#8b979f">一斉授業</text>
  <text x="700" y="672" font-size="12.5" fill="#8b979f">個別化</text>
  <text x="300" y="180" font-size="12.5" fill="#8b979f">一斉型プロジェクト</text>
  <text x="700" y="180" font-size="12.5" fill="#8b979f">プロジェクト化（探究）</text>

  <!-- 軸 -->
  <path d="M 150 700 L 830 700" stroke="#8b979f" stroke-width="2" marker-end="url(#arrowGr)"/>
  <path d="M 150 700 L 150 130" stroke="#8b979f" stroke-width="2" marker-end="url(#arrowGr)"/>
  <text x="490" y="732" font-size="13.5" fill="#8b979f" text-anchor="middle">方法の自由度</text>
  <text x="118" y="420" font-size="13.5" fill="#8b979f" text-anchor="middle" transform="rotate(-90 118 420)">内容・目標の自由度</text>

  <!-- 旅程パス -->
  <path d="M 215 640 C 330 640 400 610 520 560 C 640 510 640 400 620 330 C 610 290 640 250 720 225"
        fill="none" stroke="#2e7d8a" stroke-width="4" stroke-dasharray="10 7" marker-end="url(#arrowB2)"/>
  <path d="M 745 215 C 800 195 830 175 862 148" fill="none" stroke="#d9822b" stroke-width="4" stroke-dasharray="4 6" marker-end="url(#arrowO)"/>

  <!-- ステーション -->
  <g>
    <circle cx="215" cy="640" r="24" fill="#2e7d8a"/>
    <text x="215" y="647" font-size="15" fill="#ffffff" text-anchor="middle" font-weight="bold">0</text>
    <text x="215" y="590" font-size="14.5" fill="#333d47" text-anchor="middle" font-weight="bold">対話できる土壌づくり</text>
    <text x="215" y="612" font-size="12.5" fill="#5c6770" text-anchor="middle">協同性の埋め込み</text>
  </g>
  <g>
    <circle cx="520" cy="560" r="24" fill="#2e7d8a"/>
    <text x="520" y="567" font-size="15" fill="#ffffff" text-anchor="middle" font-weight="bold">1</text>
    <text x="530" y="608" font-size="14.5" fill="#333d47" text-anchor="middle" font-weight="bold">個別化と協同化の</text>
    <text x="530" y="630" font-size="14.5" fill="#333d47" text-anchor="middle" font-weight="bold">一体的な充実</text>
  </g>
  <g>
    <circle cx="628" cy="360" r="24" fill="#2e7d8a"/>
    <text x="628" y="367" font-size="15" fill="#ffffff" text-anchor="middle" font-weight="bold">2</text>
    <text x="722" y="378" font-size="14.5" fill="#333d47" text-anchor="middle" font-weight="bold">プロジェクト化</text>
  </g>
  <g>
    <circle cx="720" cy="225" r="24" fill="#2e7d8a"/>
    <text x="720" y="232" font-size="15" fill="#ffffff" text-anchor="middle" font-weight="bold">3</text>
    <text x="700" y="278" font-size="14.5" fill="#333d47" text-anchor="middle" font-weight="bold">評価の転換</text>
    <text x="700" y="300" font-size="12.5" fill="#5c6770" text-anchor="middle">点数からプロセスと成長へ</text>
  </g>
  <!-- +1 は枠の外へ -->
  <g>
    <rect x="810" y="88" width="170" height="90" rx="10" fill="#ffffff" stroke="#d9822b" stroke-width="2.5" stroke-dasharray="7 5"/>
    <circle cx="845" cy="120" r="20" fill="#d9822b"/>
    <text x="845" y="127" font-size="14" fill="#ffffff" text-anchor="middle" font-weight="bold">＋1</text>
    <text x="880" y="115" font-size="13.5" fill="#333d47" font-weight="bold">環境構成の</text>
    <text x="880" y="135" font-size="13.5" fill="#333d47" font-weight="bold">委譲</text>
    <text x="825" y="164" font-size="11.5" fill="#5c6770">枠組みそのものへ</text>
  </g>

  <text x="500" y="790" font-size="14" fill="#333d47" text-anchor="middle" font-weight="bold">ステップ0は、手元の道具で今日から始められる</text>
  <text x="500" y="820" font-size="13" fill="#9aa5ad" text-anchor="middle">「＋1」が連番でないのは、学校の枠組みの中の自由から、枠組みそのものの委譲へと次元が変わる一歩だから</text>

  <defs>
    <marker id="arrowB2" markerWidth="10" markerHeight="10" refX="8" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#2e7d8a"/>
    </marker>
    <marker id="arrowO" markerWidth="10" markerHeight="10" refX="8" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#d9822b"/>
    </marker>
    <marker id="arrowGr" markerWidth="10" markerHeight="10" refX="8" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#8b979f"/>
    </marker>
  </defs>
</svg>
