<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 780" font-family="'Hiragino Kaku Gothic ProN','Hiragino Sans','Yu Gothic',sans-serif">
  <rect width="1100" height="780" fill="#ffffff"/>
  <text x="40" y="46" font-size="22" font-weight="bold" fill="#333d47">図13｜個別化×協同化の学習ログサイクル（個⇒集団⇒個の循環・第3章・次点）</text>
  <text x="1060" y="46" font-size="14" fill="#9aa5ad" text-anchor="end">【仮案】</text>
  <text x="40" y="78" font-size="14" fill="#5c6770">最高の学びが起きているとき、スタディログにはこの軌跡が残る</text>

  <!-- 背景の2つのゾーン -->
  <rect x="60" y="130" width="470" height="520" rx="14" fill="#e6f1f3" opacity="0.5"/>
  <rect x="570" y="130" width="470" height="520" rx="14" fill="#eef4f0" opacity="0.6"/>
  <text x="295" y="170" font-size="15" fill="#2e7d8a" text-anchor="middle" font-weight="bold">個（個別化）</text>
  <text x="805" y="170" font-size="15" fill="#5f8f6a" text-anchor="middle" font-weight="bold">集団（協同化）</text>

  <!-- ステップ1 -->
  <g>
    <rect x="100" y="210" width="390" height="120" rx="10" fill="#ffffff" stroke="#2e7d8a" stroke-width="2"/>
    <circle cx="135" cy="245" r="18" fill="#2e7d8a"/>
    <text x="135" y="251" font-size="15" fill="#ffffff" text-anchor="middle" font-weight="bold">1</text>
    <text x="165" y="251" font-size="15.5" fill="#333d47" font-weight="bold">一人で試行錯誤する</text>
    <text x="128" y="285" font-size="13" fill="#5c6770">自分の課題に向かって、まず自力で</text>
    <text x="128" y="307" font-size="13" fill="#5c6770">じっくり考える時間がある</text>
  </g>
  <!-- ステップ2 -->
  <g>
    <rect x="610" y="210" width="390" height="120" rx="10" fill="#ffffff" stroke="#5f8f6a" stroke-width="2"/>
    <circle cx="645" cy="245" r="18" fill="#5f8f6a"/>
    <text x="645" y="251" font-size="15" fill="#ffffff" text-anchor="middle" font-weight="bold">2</text>
    <text x="675" y="251" font-size="15.5" fill="#333d47" font-weight="bold">壁にぶつかり、他者の回答を見にいく</text>
    <text x="638" y="285" font-size="13" fill="#5c6770">行き詰まったとき、必要に応じて</text>
    <text x="638" y="307" font-size="13" fill="#5c6770">仲間の考えにアクセスする</text>
  </g>
  <!-- ステップ3 -->
  <g>
    <rect x="610" y="440" width="390" height="120" rx="10" fill="#ffffff" stroke="#5f8f6a" stroke-width="2"/>
    <circle cx="645" cy="475" r="18" fill="#5f8f6a"/>
    <text x="645" y="481" font-size="15" fill="#ffffff" text-anchor="middle" font-weight="bold">3</text>
    <text x="675" y="481" font-size="15.5" fill="#333d47" font-weight="bold">「いいね」やコメントで対話する</text>
    <text x="638" y="515" font-size="13" fill="#5c6770">複数の仲間と反応を交わし、</text>
    <text x="638" y="537" font-size="13" fill="#5c6770">考えの違いから学ぶ</text>
  </g>
  <!-- ステップ4 -->
  <g>
    <rect x="100" y="440" width="390" height="120" rx="10" fill="#ffffff" stroke="#2e7d8a" stroke-width="2"/>
    <circle cx="135" cy="475" r="18" fill="#2e7d8a"/>
    <text x="135" y="481" font-size="15" fill="#ffffff" text-anchor="middle" font-weight="bold">4</text>
    <text x="165" y="481" font-size="15.5" fill="#333d47" font-weight="bold">自分の課題に戻り、回答を更新する</text>
    <text x="128" y="515" font-size="13" fill="#5c6770">他者から得た知見で、</text>
    <text x="128" y="537" font-size="13" fill="#5c6770">自分の学びをもう一段深める</text>
  </g>

  <!-- 循環矢印 -->
  <path d="M 498 270 L 602 270" stroke="#8b979f" stroke-width="3.5" marker-end="url(#arrC)"/>
  <path d="M 805 338 L 805 432" stroke="#8b979f" stroke-width="3.5" marker-end="url(#arrC)"/>
  <path d="M 602 500 L 498 500" stroke="#8b979f" stroke-width="3.5" marker-end="url(#arrC)"/>
  <path d="M 295 432 L 295 338" stroke="#8b979f" stroke-width="3.5" marker-end="url(#arrC)" stroke-dasharray="8 6"/>
  <text x="272" y="390" font-size="12.5" fill="#8b979f" text-anchor="end">次の課題へ</text>

  <text x="550" y="700" font-size="14.5" fill="#333d47" text-anchor="middle" font-weight="bold">「個から集団へ、そして再び個へ」。このログの循環が、個別化と協同化が一体になった証</text>
  <text x="550" y="732" font-size="13" fill="#9aa5ad" text-anchor="middle">活動の前後で自分の回答が更新されていれば、「活動あって学びなし」にはなっていない</text>

  <defs>
    <marker id="arrC" markerWidth="10" markerHeight="10" refX="8" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#8b979f"/>
    </marker>
  </defs>
</svg>
