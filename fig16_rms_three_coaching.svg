<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 760" font-family="'Hiragino Kaku Gothic ProN','Hiragino Sans','Yu Gothic',sans-serif">
  <rect width="1400" height="760" fill="#ffffff"/>
  <text x="40" y="46" font-size="22" font-weight="bold" fill="#333d47">図16｜RMSと生成AIが実現する「3つのコーチング」（第4章・次点）</text>
  <text x="1360" y="46" font-size="14" fill="#9aa5ad" text-anchor="end">【仮案】</text>

  <!-- RMS -->
  <g>
    <rect x="60" y="180" width="360" height="300" rx="12" fill="#e6f1f3" stroke="#2e7d8a" stroke-width="2.5"/>
    <text x="240" y="235" font-size="20" fill="#2e7d8a" text-anchor="middle" font-weight="bold">RMS</text>
    <text x="240" y="263" font-size="13.5" fill="#5c6770" text-anchor="middle">リフレクション・マネジメントシステム</text>
    <text x="93" y="310" font-size="13.5" fill="#333d47">点数や進捗（LMS）ではなく、</text>
    <text x="93" y="334" font-size="13.5" fill="#333d47">学習者自身の振り返り</text>
    <text x="93" y="358" font-size="13.5" fill="#333d47">（主観的な内面データ）を扱い、</text>
    <text x="93" y="382" font-size="13.5" fill="#333d47">自己調整型の学びを支援する。</text>
    <text x="93" y="424" font-size="12.5" fill="#5c6770">生成AIが読み込み、潜在的な目標を</text>
    <text x="93" y="446" font-size="12.5" fill="#5c6770">見つけ出す。</text>
  </g>

  <path d="M 428 330 L 495 330" stroke="#2e7d8a" stroke-width="4" marker-end="url(#arrR)"/>
  <text x="462" y="308" font-size="13" fill="#2e7d8a" text-anchor="middle" font-weight="bold">生成AI</text>

  <!-- 3つのコーチング -->
  <g>
    <rect x="510" y="110" width="830" height="150" rx="12" fill="#ffffff" stroke="#2e7d8a" stroke-width="2"/>
    <rect x="510" y="110" width="230" height="150" rx="12" fill="#2e7d8a"/>
    <text x="625" y="175" font-size="17" fill="#ffffff" text-anchor="middle" font-weight="bold">業務（学習）支援</text>
    <text x="625" y="203" font-size="12.5" fill="#e6f1f3" text-anchor="middle">やり方を助言する</text>
    <text x="770" y="165" font-size="14" fill="#333d47">「その課題なら、まずこの方法から試すのが近道です。</text>
    <text x="770" y="191" font-size="14" fill="#333d47">　明日はここから始めてみましょう」</text>
    <text x="770" y="228" font-size="12.5" fill="#5c6770">具体的なネクストアクションを示す</text>
  </g>
  <g>
    <rect x="510" y="290" width="830" height="150" rx="12" fill="#ffffff" stroke="#5f8f6a" stroke-width="2"/>
    <rect x="510" y="290" width="230" height="150" rx="12" fill="#5f8f6a"/>
    <text x="625" y="355" font-size="17" fill="#ffffff" text-anchor="middle" font-weight="bold">内省支援</text>
    <text x="625" y="383" font-size="12.5" fill="#eef4f0" text-anchor="middle">問いかけて深める</text>
    <text x="770" y="345" font-size="14" fill="#333d47">「あなたが『うまくいかなかった』と感じた理由は、</text>
    <text x="770" y="371" font-size="14" fill="#333d47">　具体的にどの部分ですか？」</text>
    <text x="770" y="408" font-size="12.5" fill="#5c6770">経験を教訓に変える内省を促す</text>
  </g>
  <g>
    <rect x="510" y="470" width="830" height="150" rx="12" fill="#ffffff" stroke="#d9822b" stroke-width="2"/>
    <rect x="510" y="470" width="230" height="150" rx="12" fill="#d9822b"/>
    <text x="625" y="535" font-size="17" fill="#ffffff" text-anchor="middle" font-weight="bold">精神的支援</text>
    <text x="625" y="563" font-size="12.5" fill="#fdf3e7" text-anchor="middle">共感し、承認する</text>
    <text x="770" y="525" font-size="14" fill="#333d47">「そこまで気づけたのは素晴らしいですね」</text>
    <text x="770" y="562" font-size="12.5" fill="#5c6770">共感と承認を通じて自己効力感を高める</text>
  </g>

  <text x="700" y="672" font-size="13.5" fill="#5c6770" text-anchor="middle">3つの支援は中原淳『職場学習論』の枠組み。AIは評価者ではなく、本人が自分の言葉を見つけるための伴走者</text>
  <text x="700" y="700" font-size="13" fill="#9aa5ad" text-anchor="middle">この設計思想を外すと、RMSは「内面を管理するシステム」になってしまう</text>

  <defs>
    <marker id="arrR" markerWidth="10" markerHeight="10" refX="8" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#2e7d8a"/>
    </marker>
  </defs>
</svg>
