<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 660" font-family="'Hiragino Kaku Gothic ProN','Hiragino Sans','Yu Gothic',sans-serif">
  <rect width="1500" height="660" fill="#ffffff"/>
  <text x="40" y="46" font-size="22" font-weight="bold" fill="#333d47">図4｜場の5類型：「個別」と4つの「きょうどう」（第2章）</text>
  <text x="1460" y="46" font-size="14" fill="#9aa5ad" text-anchor="end">【仮案】</text>
  <text x="40" y="78" font-size="14.5" fill="#5c6770">4つの「きょうどう」は、読みは同じでも関わり合いの質が異なる（本書の独自定義）</text>

  <!-- カード共通: y=110..470 w=270 -->
  <!-- 個別 -->
  <g>
    <rect x="45" y="110" width="270" height="360" rx="10" fill="#f6f8f9" stroke="#b9c4cb" stroke-width="1.5"/>
    <text x="180" y="152" font-size="24" fill="#333d47" text-anchor="middle" font-weight="bold">個別</text>
    <g transform="translate(180,230)">
      <circle cx="0" cy="0" r="14" fill="#2e7d8a"/>
    </g>
    <text x="63" y="310" font-size="13.5" fill="#5c6770">他者と交わらず、一人で</text>
    <text x="63" y="332" font-size="13.5" fill="#5c6770">自身の学びや課題に</text>
    <text x="63" y="354" font-size="13.5" fill="#5c6770">深く没頭している状態。</text>
  </g>
  <!-- 共同 -->
  <g>
    <rect x="330" y="110" width="270" height="360" rx="10" fill="#ffffff" stroke="#2e7d8a" stroke-width="1.5"/>
    <text x="465" y="152" font-size="24" fill="#333d47" text-anchor="middle" font-weight="bold">共同</text>
    <text x="465" y="176" font-size="12.5" fill="#5c6770" text-anchor="middle">Co-existence</text>
    <g transform="translate(465,230)">
      <circle cx="-50" cy="-10" r="11" fill="#2e7d8a"/>
      <circle cx="10" cy="18" r="11" fill="#2e7d8a"/>
      <circle cx="55" cy="-14" r="11" fill="#2e7d8a"/>
    </g>
    <text x="348" y="310" font-size="13.5" fill="#5c6770">同じ空間に集まってはいるが、</text>
    <text x="348" y="332" font-size="13.5" fill="#5c6770">それぞれ別の課題に向かい、</text>
    <text x="348" y="354" font-size="13.5" fill="#5c6770">互いに干渉しない状態。</text>
    <text x="348" y="376" font-size="13.5" fill="#5c6770">幼児の「平行遊び」に近い。</text>
  </g>
  <!-- 協同 -->
  <g>
    <rect x="615" y="110" width="270" height="360" rx="10" fill="#ffffff" stroke="#2e7d8a" stroke-width="1.5"/>
    <text x="750" y="152" font-size="24" fill="#333d47" text-anchor="middle" font-weight="bold">協同</text>
    <text x="750" y="176" font-size="12.5" fill="#5c6770" text-anchor="middle">Cooperation</text>
    <g transform="translate(750,230)">
      <circle cx="-55" cy="0" r="11" fill="#2e7d8a"/>
      <circle cx="-18" cy="0" r="11" fill="#2e7d8a"/>
      <circle cx="19" cy="0" r="11" fill="#2e7d8a"/>
      <path d="M 38 0 L 66 0" stroke="#2e7d8a" stroke-width="2.5" marker-end="url(#arrowG)"/>
    </g>
    <text x="633" y="310" font-size="13.5" fill="#5c6770">与えられた同じ目的や課題に</text>
    <text x="633" y="332" font-size="13.5" fill="#5c6770">向かって、足並みを揃えて</text>
    <text x="633" y="354" font-size="13.5" fill="#5c6770">力を合わせる状態。</text>
  </g>
  <!-- 協働 -->
  <g>
    <rect x="900" y="110" width="270" height="360" rx="10" fill="#ffffff" stroke="#2e7d8a" stroke-width="1.5"/>
    <text x="1035" y="152" font-size="24" fill="#333d47" text-anchor="middle" font-weight="bold">協働</text>
    <text x="1035" y="176" font-size="12.5" fill="#5c6770" text-anchor="middle">Collaboration</text>
    <g transform="translate(1035,230)">
      <circle cx="-45" cy="-12" r="13" fill="#2e7d8a"/>
      <rect x="-8" y="8" width="22" height="22" rx="4" fill="#d9822b"/>
      <path d="M 28 -24 L 52 -2 L 28 8 Z" fill="#7a9e3b"/>
      <line x1="-33" y1="-8" x2="-6" y2="14" stroke="#8b979f" stroke-width="2"/>
      <line x1="14" y1="14" x2="30" y2="-4" stroke="#8b979f" stroke-width="2"/>
    </g>
    <text x="918" y="310" font-size="13.5" fill="#5c6770">互いの異なる強み・興味・個性を</text>
    <text x="918" y="332" font-size="13.5" fill="#5c6770">持ち寄り、活かし合いながら</text>
    <text x="918" y="354" font-size="13.5" fill="#5c6770">新しい価値や解決策を</text>
    <text x="918" y="376" font-size="13.5" fill="#5c6770">創り出す状態。</text>
  </g>
  <!-- 共働 -->
  <g>
    <rect x="1185" y="110" width="270" height="360" rx="10" fill="#ffffff" stroke="#d9822b" stroke-width="2"/>
    <text x="1320" y="152" font-size="24" fill="#333d47" text-anchor="middle" font-weight="bold">共働</text>
    <text x="1320" y="176" font-size="12.5" fill="#5c6770" text-anchor="middle">Co-action / Co-creation</text>
    <g transform="translate(1320,230)">
      <circle cx="0" cy="0" r="52" fill="none" stroke="#d9822b" stroke-width="1.5" stroke-dasharray="5 5"/>
      <circle cx="-30" cy="-18" r="9" fill="#2e7d8a"/>
      <circle cx="28" cy="-22" r="9" fill="#d9822b"/>
      <circle cx="38" cy="16" r="9" fill="#7a9e3b"/>
      <circle cx="-6" cy="26" r="9" fill="#8b6bb1"/>
      <circle cx="-40" cy="16" r="9" fill="#c05a7a"/>
      <line x1="-30" y1="-18" x2="28" y2="-22" stroke="#8b979f" stroke-width="1.5"/>
      <line x1="28" y1="-22" x2="38" y2="16" stroke="#8b979f" stroke-width="1.5"/>
      <line x1="38" y1="16" x2="-6" y2="26" stroke="#8b979f" stroke-width="1.5"/>
      <line x1="-6" y1="26" x2="-40" y2="16" stroke="#8b979f" stroke-width="1.5"/>
      <line x1="-40" y1="16" x2="-30" y2="-18" stroke="#8b979f" stroke-width="1.5"/>
      <line x1="-30" y1="-18" x2="38" y2="16" stroke="#8b979f" stroke-width="1.5"/>
    </g>
    <text x="1203" y="310" font-size="13.5" fill="#5c6770">設定された枠組みすら超えて、</text>
    <text x="1203" y="332" font-size="13.5" fill="#5c6770">自律的・有機的に結びつき、</text>
    <text x="1203" y="354" font-size="13.5" fill="#5c6770">共に学びや社会そのものを</text>
    <text x="1203" y="376" font-size="13.5" fill="#5c6770">創り出していく状態。</text>
  </g>

  <!-- 深まりの矢印 -->
  <path d="M 340 520 L 1440 520" stroke="#2e7d8a" stroke-width="4" marker-end="url(#arrowG)"/>
  <text x="890" y="552" font-size="15" fill="#2e7d8a" text-anchor="middle" font-weight="bold">関わり合いの質の深まり</text>
  <text x="750" y="608" font-size="14" fill="#5c6770" text-anchor="middle">どの類型が優れているかではなく、学びの目的に応じて5つの場を行き来（往還）することが重要</text>

  <defs>
    <marker id="arrowG" markerWidth="10" markerHeight="10" refX="8" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#2e7d8a"/>
    </marker>
  </defs>
</svg>
