<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 940" font-family="'Hiragino Kaku Gothic ProN','Hiragino Sans','Yu Gothic',sans-serif">
  <!-- 仮案 v1 -->
  <rect width="1600" height="940" fill="#ffffff"/>
  <text x="40" y="46" font-size="24" font-weight="bold" fill="#333d47">図1｜本書の全体地図（巻頭・見開き想定）</text>
  <text x="1560" y="46" font-size="14" fill="#9aa5ad" text-anchor="end">【仮案】</text>

  <!-- 幹 -->
  <rect x="40" y="70" width="1530" height="44" rx="22" fill="#2e7d8a"/>
  <text x="805" y="98" font-size="16" fill="#ffffff" text-anchor="middle" font-weight="bold">幹：P-EBP ＝ 「哲学 → 実証 → 実践」の順に問いを重ねる（哲学原理とエビデンスに基づいた実践）</text>

  <!-- 3つの問いチップ（第1〜3章の上） -->
  <g font-size="14.5">
    <rect x="40" y="140" width="290" height="56" rx="28" fill="#e6f1f3" stroke="#2e7d8a" stroke-width="1.5"/>
    <text x="185" y="163" fill="#2e7d8a" text-anchor="middle" font-weight="bold">哲学の問い</text>
    <text x="185" y="185" fill="#333d47" text-anchor="middle">よい教育とは何か</text>
    <rect x="350" y="140" width="290" height="56" rx="28" fill="#e6f1f3" stroke="#2e7d8a" stroke-width="1.5"/>
    <text x="495" y="163" fill="#2e7d8a" text-anchor="middle" font-weight="bold">実証の問い</text>
    <text x="495" y="185" fill="#333d47" text-anchor="middle">何がどの条件で有効か</text>
    <rect x="660" y="140" width="290" height="56" rx="28" fill="#e6f1f3" stroke="#2e7d8a" stroke-width="1.5"/>
    <text x="805" y="163" fill="#2e7d8a" text-anchor="middle" font-weight="bold">実践の問い</text>
    <text x="805" y="185" fill="#333d47" text-anchor="middle">どう実践すればよいか</text>
  </g>
  <path d="M 332 168 L 348 168" stroke="#2e7d8a" stroke-width="3" marker-end="url(#arrowM)"/>
  <path d="M 642 168 L 658 168" stroke="#2e7d8a" stroke-width="3" marker-end="url(#arrowM)"/>
  <path d="M 970 168 L 1550 168" stroke="#d9822b" stroke-width="2.5" stroke-dasharray="8 6" marker-end="url(#arrowM2)"/>
  <text x="1260" y="152" font-size="13.5" fill="#d9822b" text-anchor="middle" font-weight="bold">学びは学校の外へ、生涯へと広がる</text>

  <!-- 第1章 -->
  <g>
    <rect x="40" y="230" width="290" height="560" rx="12" fill="#ffffff" stroke="#b9c4cb" stroke-width="1.5"/>
    <rect x="40" y="230" width="290" height="78" rx="12" fill="#333d47"/>
    <text x="185" y="262" font-size="16" fill="#ffffff" text-anchor="middle" font-weight="bold">第1章【哲学】</text>
    <text x="185" y="290" font-size="14" fill="#dde5e9" text-anchor="middle">なぜ学ぶのか</text>
    <g font-size="13.5" fill="#333d47">
      <text x="62" y="350" font-weight="bold">自由</text>
      <text x="62" y="373" fill="#5c6770">自分の人生を自分なりに</text>
      <text x="62" y="394" fill="#5c6770">生きていく力</text>
      <text x="62" y="436" font-weight="bold">自由の相互承認</text>
      <text x="62" y="459" fill="#5c6770">他者もまた自由な存在で</text>
      <text x="62" y="480" fill="#5c6770">あることを認め合う感度</text>
      <text x="62" y="522" font-weight="bold">個性最適×協働最適な学び</text>
      <text x="62" y="545" fill="#5c6770">「個別最適×協働的な学び」の</text>
      <text x="62" y="566" fill="#5c6770">本書による捉え直し</text>
    </g>
  </g>

  <!-- 第2章 -->
  <g>
    <rect x="350" y="230" width="290" height="560" rx="12" fill="#ffffff" stroke="#2e7d8a" stroke-width="2.5"/>
    <rect x="350" y="230" width="290" height="78" rx="12" fill="#2e7d8a"/>
    <text x="495" y="262" font-size="16" fill="#ffffff" text-anchor="middle" font-weight="bold">第2章【実証】</text>
    <text x="495" y="290" font-size="14" fill="#e6f1f3" text-anchor="middle">どう確かめるか</text>
    <g font-size="13.5" fill="#333d47">
      <text x="372" y="350" font-weight="bold"><tspan fill="#d9822b">★</tspan>場の5類型</text>
      <text x="372" y="373" fill="#5c6770">個別・共同・協同・協働・共働</text>
      <text x="372" y="411" font-weight="bold"><tspan fill="#d9822b">★</tspan>教育データサイクル</text>
      <text x="372" y="434" fill="#5c6770">主体・内容・活動の3つの情報</text>
      <text x="372" y="457" fill="#5c6770">の循環</text>
      <text x="372" y="495" font-weight="bold">ScTNフレーム</text>
      <text x="372" y="518" fill="#5c6770">経験→成長→成果の実感</text>
      <text x="372" y="556" font-weight="bold"><tspan fill="#d9822b">★</tspan>AIの2つの役割</text>
      <text x="372" y="579" fill="#5c6770">チューター（個性最適）と</text>
      <text x="372" y="600" fill="#5c6770">タクト（協働最適）</text>
      <text x="372" y="638" font-weight="bold"><tspan fill="#d9822b">★</tspan>7つのガードレール</text>
      <text x="372" y="661" fill="#5c6770">AIとデータの「守りの利用」</text>
    </g>
  </g>

  <!-- 第3章 -->
  <g>
    <rect x="660" y="230" width="290" height="560" rx="12" fill="#ffffff" stroke="#b9c4cb" stroke-width="1.5"/>
    <rect x="660" y="230" width="290" height="78" rx="12" fill="#333d47"/>
    <text x="805" y="262" font-size="16" fill="#ffffff" text-anchor="middle" font-weight="bold">第3章【実践】</text>
    <text x="805" y="290" font-size="14" fill="#dde5e9" text-anchor="middle">どう進めるか</text>
    <g font-size="13.5" fill="#333d47">
      <text x="682" y="350" font-weight="bold">原理</text>
      <text x="682" y="373" fill="#5c6770">個別化・協同化・</text>
      <text x="682" y="394" fill="#5c6770">プロジェクト化の融合</text>
      <text x="682" y="436" font-weight="bold">羅針盤</text>
      <text x="682" y="459" fill="#5c6770">授業の自由度フレーム</text>
      <text x="682" y="501" font-weight="bold">旅程</text>
      <text x="682" y="524" fill="#5c6770">ステップ0〜＋1</text>
      <text x="682" y="566" font-weight="bold">インフラ</text>
      <text x="682" y="589" fill="#5c6770">副担任AI（チューターと</text>
      <text x="682" y="610" fill="#5c6770">タクトを実装する基盤）</text>
    </g>
  </g>

  <!-- 第4章 -->
  <g>
    <rect x="970" y="230" width="290" height="560" rx="12" fill="#ffffff" stroke="#b9c4cb" stroke-width="1.5"/>
    <rect x="970" y="230" width="290" height="78" rx="12" fill="#7a5f8f"/>
    <text x="1115" y="262" font-size="16" fill="#ffffff" text-anchor="middle" font-weight="bold">第4章【未来】</text>
    <text x="1115" y="290" font-size="14" fill="#efe9f4" text-anchor="middle">どこまで広がるか</text>
    <g font-size="13.5" fill="#333d47">
      <text x="992" y="350" font-weight="bold">学びの地図</text>
      <text x="992" y="373" fill="#5c6770">フォーマルとインフォーマルを</text>
      <text x="992" y="394" fill="#5c6770">本人の選択でつなぐ器</text>
      <text x="992" y="436" font-weight="bold">RMS</text>
      <text x="992" y="459" fill="#5c6770">振り返りを人生の資産に</text>
      <text x="992" y="480" fill="#5c6770">変える仕組み</text>
      <text x="992" y="522" font-weight="bold">思考の主権と「評価しない余白」</text>
      <text x="992" y="545" fill="#5c6770">AIの最適化に呑み込まれない</text>
      <text x="992" y="566" fill="#5c6770">ための防壁</text>
    </g>
  </g>

  <!-- 第5章 -->
  <g>
    <rect x="1280" y="230" width="290" height="560" rx="12" fill="#ffffff" stroke="#b9c4cb" stroke-width="1.5"/>
    <rect x="1280" y="230" width="290" height="78" rx="12" fill="#b06a2c"/>
    <text x="1425" y="262" font-size="16" fill="#ffffff" text-anchor="middle" font-weight="bold">第5章【生涯学習】</text>
    <text x="1425" y="290" font-size="14" fill="#fdf3e7" text-anchor="middle">誰の話か</text>
    <g font-size="13.5" fill="#333d47">
      <text x="1302" y="350" font-weight="bold">包含関係</text>
      <text x="1302" y="373" fill="#5c6770">公教育も社員教育も</text>
      <text x="1302" y="394" fill="#5c6770">生涯学習の一部分</text>
      <text x="1302" y="415" font-weight="bold">G-POP／G-POPぐるり</text>
      <text x="1302" y="438" fill="#5c6770">大人の経験学習サイクルの型</text>
      <text x="1302" y="480" font-weight="bold">自由の持続的拡張</text>
      <text x="1302" y="503" fill="#5c6770">学びの旅が一生涯</text>
      <text x="1302" y="524" fill="#5c6770">続いていくこと</text>
    </g>
  </g>

  <!-- 脚注 -->
  <rect x="40" y="830" width="1530" height="66" rx="10" fill="#f6f8f9"/>
  <text x="805" y="858" font-size="14.5" fill="#333d47" text-anchor="middle"><tspan fill="#d9822b" font-weight="bold">★</tspan>＝本書の骨格となる4つの概念。ここに並ぶ用語を覚えながら読む必要はありません。</text>
  <text x="805" y="882" font-size="13" fill="#5c6770" text-anchor="middle">それ以外の用語は本文に登場するたびに説明し直し、巻末の用語集でいつでも引き直せます。迷子になったら、このページに戻ってきてください。</text>

  <defs>
    <marker id="arrowM" markerWidth="10" markerHeight="10" refX="8" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#2e7d8a"/>
    </marker>
    <marker id="arrowM2" markerWidth="10" markerHeight="10" refX="8" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#d9822b"/>
    </marker>
  </defs>
</svg>
